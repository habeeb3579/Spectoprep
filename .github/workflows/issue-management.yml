name: Issue Management

on:
  issues:
    types: [opened]
  schedule:
    - cron: "0 2 * * 1" # Weekly Monday 02:00 UTC

permissions:
  issues: write

concurrency:
  group: issue-management-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

# Project v2 IDs must be set under Settings > Secrets and variables > Actions > Variables.
# Jobs that need the board skip cleanly when PROJECT_ID / PROJECT_TOKEN are unset.
env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  STATUS_FIELD_ID: ${{ vars.STATUS_FIELD_ID }}
  TODO_OPTION_ID: ${{ vars.TODO_OPTION_ID }}

jobs:
  new-issue:
    name: Greet and triage
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Comment on new issues
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Thanks for opening this issue. We will take a look soon."
            });
      - name: Add triage label if missing
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            if (!labels.includes("triage")) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ["triage"]
              });
            }

  assign-to-project:
    name: Assign issue to project
    runs-on: ubuntu-latest
    # secrets cannot be compared in `if:`; gate on vars and fail clearly if token missing.
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      vars.PROJECT_ID != ''
    steps:
      - name: Add issue to project and set Todo status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = process.env.PROJECT_ID;
            const statusFieldId = process.env.STATUS_FIELD_ID;
            const todoOptionId = process.env.TODO_OPTION_ID;
            if (!projectId || !statusFieldId || !todoOptionId) {
              core.setFailed(
                "PROJECT_ID, STATUS_FIELD_ID, and TODO_OPTION_ID repository variables are required."
              );
              return;
            }

            const addToProject = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `;
            const response = await github.graphql(addToProject, {
              projectId,
              contentId: context.payload.issue.node_id,
            });
            const itemId = response.addProjectV2ItemById.item.id;

            const updateStatus = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `;
            await github.graphql(updateStatus, {
              projectId,
              itemId,
              fieldId: statusFieldId,
              optionId: todoOptionId,
            });

  stale-issues:
    name: Mark stale issues
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been marked as stale due to 90 days of inactivity.
            It will be closed in 14 days if there is no further activity.
          close-issue-message: >
            Closing this issue due to inactivity. Feel free to reopen if it is still relevant.
          stale-issue-label: stale
          days-before-stale: 90
          days-before-close: 14
          days-before-pr-stale: -1
          days-before-pr-close: -1
          exempt-issue-labels: bug,enhancement,security,documentation
