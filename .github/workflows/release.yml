name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build PyPI distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for PyPI Trusted Publishing; no API token needed.
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-conda:
    name: Publish to Anaconda.org (habeebest)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: build
          python-version: "3.12"
          channels: conda-forge
          conda-solver: libmamba
          # conda-build must live in base: modern conda only loads the
          # ``conda build`` plugin from the base env (not from ``build``).
          conda-build-version: "*"
      - name: Install anaconda-client
        run: |
          # Install into the *active* env (build). Packages in base alone are not
          # always on PATH when another env is activated.
          conda install -y -c conda-forge anaconda-client
          hash -r
          command -v anaconda
          anaconda --version
      - name: Build conda package
        run: |
          conda build --version
          conda build conda-recipe \
            -c conda-forge \
            --no-anaconda-upload \
            --output-folder "${GITHUB_WORKSPACE}/conda-bld"
      - name: Upload to Anaconda.org
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          if [ -z "${ANACONDA_TOKEN}" ]; then
            echo "ANACONDA_TOKEN secret is required to publish to anaconda.org/habeebest."
            exit 1
          fi
          shopt -s nullglob
          pkgs=(
            "${GITHUB_WORKSPACE}"/conda-bld/noarch/spectoprep-*.tar.bz2
            "${GITHUB_WORKSPACE}"/conda-bld/noarch/spectoprep-*.conda
          )
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "No spectoprep packages found under conda-bld/noarch"
            find "${GITHUB_WORKSPACE}/conda-bld" -type f | head -50
            exit 1
          fi
          # Prefer active-env CLI; fall back to base/miniconda bin.
          if command -v anaconda >/dev/null 2>&1; then
            ANACONDA_CLI="$(command -v anaconda)"
          elif [ -x "${CONDA}/bin/anaconda" ]; then
            ANACONDA_CLI="${CONDA}/bin/anaconda"
          else
            echo "anaconda CLI not found after installing anaconda-client"
            conda list anaconda-client
            ls -la "${CONDA}/bin/anaconda"* 2>/dev/null || true
            exit 1
          fi
          echo "Using: ${ANACONDA_CLI}"
          # --force allows re-running the workflow for the same version (e.g. alpha retries).
          "${ANACONDA_CLI}" --token "${ANACONDA_TOKEN}" upload -u habeebest --force "${pkgs[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: conda-dist
          path: |
            conda-bld/noarch/spectoprep-*.tar.bz2
            conda-bld/noarch/spectoprep-*.conda
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs: [publish-pypi, publish-conda]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: conda-dist
          path: conda-dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            conda-dist/*
          generate_release_notes: true
