name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build PyPI distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for PyPI Trusted Publishing; no API token needed.
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Allow re-runs after a successful publish (PyPI forbids replacing files).
          skip-existing: true

  publish-conda:
    name: Publish to Anaconda.org (habeebest)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: build
          python-version: "3.12"
          channels: conda-forge
          conda-solver: libmamba
          # conda-build must live in base: modern conda only loads the
          # ``conda build`` plugin from the base env (not from ``build``).
          conda-build-version: "*"
      - name: Install anaconda-client
        run: |
          # The setup-miniconda "build" env may not ship pip; install via conda.
          conda install -y -c conda-forge pip anaconda-client
          test -x "${CONDA_PREFIX}/bin/anaconda"
          # anaconda-cli-base plugins hijack `anaconda`; force classic client.
          export ANACONDA_CLIENT_FORCE_STANDALONE=1
          "${CONDA_PREFIX}/bin/anaconda" -V
      - name: Build conda package
        run: |
          conda build --version
          conda build conda-recipe \
            -c conda-forge \
            --no-anaconda-upload \
            --output-folder "${GITHUB_WORKSPACE}/conda-bld"
      - name: Upload to Anaconda.org
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
          # Use classic binstar CLI (supports --token upload), not anaconda-cli-base.
          ANACONDA_CLIENT_FORCE_STANDALONE: "1"
        run: |
          if [ -z "${ANACONDA_TOKEN}" ]; then
            echo "ANACONDA_TOKEN secret is required to publish to anaconda.org/habeebest."
            exit 1
          fi
          shopt -s nullglob
          pkgs=(
            "${GITHUB_WORKSPACE}"/conda-bld/noarch/spectoprep-*.tar.bz2
            "${GITHUB_WORKSPACE}"/conda-bld/noarch/spectoprep-*.conda
          )
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "No spectoprep packages found under conda-bld/noarch"
            find "${GITHUB_WORKSPACE}/conda-bld" -type f | head -50
            exit 1
          fi
          ANACONDA_CLI="${CONDA_PREFIX}/bin/anaconda"
          if [ ! -x "${ANACONDA_CLI}" ]; then
            echo "Missing ${ANACONDA_CLI}"
            echo "CONDA_PREFIX=${CONDA_PREFIX}"
            ls -la "${CONDA_PREFIX}/bin" | head -50
            conda list anaconda-client
            exit 1
          fi
          echo "Using: ${ANACONDA_CLI}"
          # --force allows re-running the workflow for the same version.
          "${ANACONDA_CLI}" --token "${ANACONDA_TOKEN}" upload -u habeebest --force "${pkgs[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: conda-dist
          path: |
            conda-bld/noarch/spectoprep-*.tar.bz2
            conda-bld/noarch/spectoprep-*.conda
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs: [publish-pypi, publish-conda]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: conda-dist
          path: conda-dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            conda-dist/*
          generate_release_notes: true
